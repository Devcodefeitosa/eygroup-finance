                            <h2 className="tech-font text-xl font-black text-white tracking-tighter">EY GROUP</h2>
                            <span className="text-[10px] text-blue-500 font-bold tracking-[0.3em]">ALPHA V2.0</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            {['DASHBOARD', 'OPERAÇÕES', 'RELATÓRIOS', 'RECURSOS AI', 'SUPORTE'].map(item => (
                                <button key={item} className="w-full text-left p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all text-[11px] font-bold tracking-widest border border-transparent hover:border-blue-900/50">
                                    {item}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setView('login')} className="text-red-500 text-[11px] font-bold p-4 border border-red-900/20 rounded-2xl hover:bg-red-900/10 transition-all">TERMINAR SESSÃO</button>
                    </aside>

                    <main className="flex-1 p-10 overflow-auto">
                        <header className="flex justify-between items-center mb-12">
                            <div>
                                <h1 className="tech-font text-3xl text-white font-black italic">COMMAND CENTER</h1>
                                <p className="text-blue-500 font-mono text-[10px] mt-1 tracking-widest">STATUS: CONEXÃO SEGURA // TOKEN: 0xFF142</p>
                            </div>
                            <div className="glass p-5 rounded-3xl border-l-4 border-blue-500 min-w-[240px]">
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Liquidez Total</p>
                                <h3 className="tech-font text-2xl text-white tracking-tighter">R$ {saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</h3>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                            <div className="glass p-8 rounded-[40px] border border-blue-500/10">
                                <h3 className="tech-font text-sm mb-8 flex items-center text-blue-400">
                                    <span className="w-1.5 h-4 bg-blue-600 mr-3"></span> INJETAR DADOS
                                </h3>
                                <form onSubmit={addTransaction} className="grid grid-cols-2 gap-4">
                                    <input name="desc" placeholder="DESCRIÇÃO DA OPERAÇÃO" required className="col-span-2 bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white" />
                                    <input name="valor" type="number" step="0.01" placeholder="VALOR (R$)" required className="bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white" />
                                    <select name="tipo" className="bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white appearance-none">
                                        <option value="Receita">RECEITA (+)</option>
                                        <option value="Despesa">DESPESA (-)</option>
                                    </select>
                                    <select name="cat" className="col-span-2 bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white">
                                        <option>MARKETING ADS</option>
                                        <option>INFRAESTRUTURA</option>
                                        <option>FOLHA SALARIAL</option>
                                        <option>INVESTIMENTOS</option>
                                        <option>LUCROS</option>
                                    </select>
                                    <button className="col-span-2 bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl tech-font text-xs font-bold tracking-[0.2em] shadow-xl transition-all active:scale-95 mt-4 text-white">PROCESSAR LANÇAMENTO</button>
                                </form>
                            </div>

                            <div className="glass p-8 rounded-[40px] border border-blue-500/10">
                                <h3 className="tech-font text-sm mb-8 text-blue-400 italic">SYSTEM LOGS</h3>
                                <div className="space-y-3 max-h-[420px] overflow-y-auto pr-3">
                                    {transactions.map((t) => (
                                        <div key={t.id} className="flex justify-between items-center bg-[#01153A]/30 p-5 rounded-3xl border border-blue-900/20 group hover:border-blue-500/40 transition-all">
                                            <div>
                                                <p className="font-bold text-xs uppercase text-gray-200 tracking-tight">{t.desc}</p>
                                                <p className="text-[9px] text-blue-500 font-mono mt-1 opacity-70">{t.cat} // {t.data}</p>
                                            </div>
                                            <div className="text-right flex items-center gap-4">
                                                <p className={"tech-font text-sm " + (t.tipo === 'Receita' ? 'text-green-400' : 'text-red-400')}>
                                                    {t.tipo === 'Receita' ? '+' : '-'} {t.valor.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}
                                                </p>
                                                <button onClick={() => deleteTransaction(t.id)} className="opacity-0 group-hover:opacity-100 text-red-900 hover:text-red-500 transition-all text-xs">✖</button>
                                            </div>
                                        </div>
                                    ))}
                                    {transactions.length === 0 && <p className="text-center text-gray-600 text-xs py-10 font-mono">NENHUM DADO REGISTRADO</p>}
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                            <div className="glass p-6 rounded-3xl border-b-2 border-green-500/50 hover:bg-green-500/5 transition-all">
                                <p className="text-[10px] font-bold text-green-500 uppercase mb-1">Entradas Hoje</p>
                                <h4 className="tech-font text-xl">R$ 14.200</h4>
                            </div>
                            <div className="glass p-6 rounded-3xl border-b-2 border-red-500/50 hover:bg-red-500/5 transition-all">
                                <p className="text-[10px] font-bold text-red-500 uppercase mb-1">Saídas Hoje</p>
                                <h4 className="tech-font text-xl">R$ 2.840</h4>
                            </div>
                            <div className="glass p-6 rounded-3xl border-b-2 border-blue-500/50 hover:bg-blue-500/5 transition-all">
                                <p className="text-[10px] font-bold text-blue-500 uppercase mb-1">Margem Alpha</p>
                                <h4 className="tech-font text-xl">82.4%</h4>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EYGroupApp />);
    </script>
</body>
</html>
