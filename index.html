<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>EY GROUP | Alpha Finance</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000814; color: white; margin: 0; padding: 0; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(2, 27, 75, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-blue { box-shadow: 0 0 30px rgba(0, 102, 255, 0.2); }
        .wolf-gradient { background: linear-gradient(135deg, #001a4d 0%, #000814 100%); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000814; }
        ::-webkit-scrollbar-thumb { background: #0044cc; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURAÇÃO CONECTADA
        const SUPABASE_URL = 'https://scuufsqhoucrzthtrmkk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjdXVmc3Fob3Vjcnp0aHRybWtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjYzOTYsImV4cCI6MjA5NDQ0MjM5Nn0.QkAX7lAFk_m_GlN6iupUA2b1AnLsh2BHsT1jlzdff74';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function EYGroupApp() {
            const [view, setView] = useState('login');
            const [user, setUser] = useState("");
            const [pass, setPass] = useState("");
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (view === 'dashboard') { fetchFromDB(); }
            }, [view]);

            async function fetchFromDB() {
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('transacoes')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (data) setTransactions(data);
                setLoading(false);
            }

            const handleLogin = (e) => {
                e.preventDefault();
                if(user === "admin" && pass === "1234") { setView('dashboard'); }
                else { alert("Acesso Negado!"); }
            };

            const addTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const nova = {
                    descricao: formData.get('desc').toUpperCase(),
                    valor: parseFloat(formData.get('valor')),
                    tipo: formData.get('tipo'),
                    categoria: formData.get('cat')
                };
                const { error } = await supabaseClient.from('transacoes').insert([nova]);
                if (!error) { fetchFromDB(); e.target.reset(); }
                else { alert("Erro ao salvar! Verifique se a tabela 'transacoes' foi criada no Supabase."); }
            };

            const deleteTransaction = async (id) => {
                const { error } = await supabaseClient.from('transacoes').delete().eq('id', id);
                if (!error) fetchFromDB();
            };

            const saldo = transactions.reduce((acc, curr) => 
                curr.tipo === 'Receita' ? acc + Number(curr.valor) : acc - Number(curr.valor), 0
            );

            if (view !== 'dashboard') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 wolf-gradient">
                        <div className="glass p-10 rounded-[40px] w-full max-w-md glow-blue text-center border-t-2 border-blue-500/50">
                            <img src="https://cdn-icons-png.flaticon.com/512/616/616554.png" className="w-24 h-24 mx-auto mb-6 rounded-2xl shadow-2xl border border-blue-500/30 object-cover" />
                            {view === 'login' && (
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <h1 className="tech-font text-2xl mb-1 text-blue-400 uppercase tracking-tighter">Wolf Auth</h1>
                                    <p className="text-[10px] text-gray-500 mb-6 tracking-widest uppercase">EY Group Alpha Terminal</p>
                                    <input type="text" placeholder="USUÁRIO" className="w-full bg-[#01153A]/50 border border-blue-900/50 p-4 rounded-2xl text-white outline-none focus:border-blue-400" onChange={(e)=>setUser(e.target.value)} />
                                    <input type="password" placeholder="SENHA" className="w-full bg-[#01153A]/50 border border-blue-900/50 p-4 rounded-2xl text-white outline-none focus:border-blue-400" onChange={(e)=>setPass(e.target.value)} />
                                    <button className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl tech-font font-bold text-sm transition-all active:scale-95">ACESSAR SISTEMA</button>
                                    <div className="flex justify-between text-[10px] text-blue-500 font-bold mt-4">
                                        <button type="button" onClick={() => setView('register')} className="hover:text-white">CRIAR CONTA</button>
                                        <button type="button" onClick={() => setView('forgot')} className="hover:text-white">ESQUECI A SENHA</button>
                                    </div>
                                </form>
                            )}
                            {view === 'register' && (
                                <div className="space-y-4">
                                    <h1 className="tech-font text-2xl text-blue-400">NEW ALPHA</h1>
                                    <input type="text" placeholder="NOME COMPLETO" className="w-full bg-[#01153A]/50 border border-blue-900/50 p-4 rounded-2xl text-white outline-none" />
                                    <input type="email" placeholder="EMAIL" className="w-full bg-[#01153A]/50 border border-blue-900/50 p-4 rounded-2xl text-white outline-none" />
                                    <button onClick={() => setView('login')} className="w-full bg-blue-600 py-4 rounded-2xl tech-font font-bold">SOLICITAR ACESSO</button>
                                    <button onClick={() => setView('login')} className="text-xs text-gray-500">VOLTAR</button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex bg-[#000814]">
                    <aside className="w-72 bg-[#010B1D] border-r border-blue-900/30 p-8 hidden lg:flex flex-col">
                        <div className="mb-12 text-center">
                            <img src="https://cdn-icons-png.flaticon.com/512/616/616554.png" className="w-16 h-16 mx-auto mb-4" />
                            <h2 className="tech-font text-xl font-black text-white">EY GROUP</h2>
                            <span className="text-[10px] text-blue-500 font-bold tracking-[0.3em]">ALPHA V2.0</span>
                        </div>
                        <nav className="flex-1 space-y-2 text-[11px] font-bold tracking-widest">
                            <button className="w-full text-left p-4 rounded-2xl bg-blue-600/10 text-blue-400 border border-blue-900/50">DASHBOARD</button>
                            <button className="w-full text-left p-4 rounded-2xl hover:bg-blue-600/10 transition-all border border-transparent hover:border-blue-900/50">OPERAÇÕES</button>
                            <button className="w-full text-left p-4 rounded-2xl hover:bg-blue-600/10 transition-all border border-transparent hover:border-blue-900/50">RELATÓRIOS</button>
                        </nav>
                        <button onClick={() => setView('login')} className="text-red-500 text-[11px] font-bold p-4 border border-red-900/20 rounded-2xl hover:bg-red-900/10">TERMINAR SESSÃO</button>
                    </aside>

                    <main className="flex-1 p-10 overflow-auto">
                        <header className="flex justify-between items-center mb-12">
                            <div>
                                <h1 className="tech-font text-3xl text-white font-black italic">COMMAND CENTER</h1>
                                <p className="text-blue-500 font-mono text-[10px] mt-1 tracking-widest uppercase">Status: Banco de Dados Conectado</p>
                            </div>
                            <div className="glass p-5 rounded-3xl border-l-4 border-blue-500 min-w-[240px]">
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Liquidez Total</p>
                                <h3 className="tech-font text-2xl text-white tracking-tighter italic">R$ {saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</h3>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                            <div className="glass p-8 rounded-[40px] border border-blue-500/10">
                                <h3 className="tech-font text-sm mb-8 flex items-center text-blue-400">
                                    <span className="w-1.5 h-4 bg-blue-600 mr-3"></span> INJETAR DADOS
                                </h3>
                                <form onSubmit={addTransaction} className="grid grid-cols-2 gap-4">
                                    <input name="desc" placeholder="DESCRIÇÃO" required className="col-span-2 bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white" />
                                    <input name="valor" type="number" step="0.01" placeholder="VALOR (R$)" required className="bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white" />
                                    <select name="tipo" className="bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white">
                                        <option value="Receita">RECEITA (+)</option>
                                        <option value="Despesa">DESPESA (-)</option>
                                    </select>
                                    <select name="cat" className="col-span-2 bg-[#000814] p-4 rounded-2xl border border-blue-900/40 focus:border-blue-500 outline-none text-xs text-white">
                                        <option>MARKETING ADS</option>
                                        <option>INFRAESTRUTURA</option>
                                        <option>FOLHA SALARIAL</option>
                                        <option>INVESTIMENTOS</option>
                                    </select>
                                    <button className="col-span-2 bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl tech-font text-xs font-bold shadow-xl transition-all active:scale-95 mt-4 text-white">PROCESSAR LANÇAMENTO</button>
                                </form>
                            </div>

                            <div className="glass p-8 rounded-[40px] border border-blue-500/10">
                                <h3 className="tech-font text-sm mb-8 text-blue-400 italic">SYSTEM LOGS {loading && "..."}</h3>
                                <div className="space-y-3 max-h-[420px] overflow-y-auto pr-3">
                                    {transactions.map((t) => (
                                        <div key={t.id} className="flex justify-between items-center bg-[#01153A]/30 p-5 rounded-3xl border border-blue-900/20 group hover:border-blue-500/40 transition-all">
                                            <div>
                                                <p className="font-bold text-xs uppercase text-gray-200 tracking-tight">{t.descricao}</p>
                                                <p className="text-[9px] text-blue-500 font-mono mt-1 opacity-70 uppercase">{t.categoria}</p>
                                            </div>
                                            <div className="text-right flex items-center gap-4">
                                                <p className={`tech-font text-sm ${t.tipo === 'Receita' ? 'text-green-400' : 'text-red-400'}`}>
                                                    {t.tipo === 'Receita' ? '+' : '-'} R$ {Number(t.valor).toLocaleString('pt-BR')}
                                                </p>
                                                <button onClick={() => deleteTransaction(t.id)} className="opacity-0 group-hover:opacity-100 text-red-500 transition-all">✖</button>
                                            </div>
                                        </div>
                                    ))}
                                    {transactions.length === 0 && !loading && <p className="text-center text-gray-600 text-xs py-10 font-mono italic">AGUARDANDO DADOS...</p>}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EYGroupApp />);
    </script>
</body>
</html>
